<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOXML Word 文档编辑器</title>

<!-- JSZip for DOCX parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- FileSaver for download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<!-- CodeMirror 5 (CDN, simpler for single-file) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/xml-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/xml-hint.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">

<style>
  :root {
    --bg-primary: #1a1b26;
    --bg-secondary: #24283b;
    --bg-tertiary: #2f3348;
    --text-primary: #c0caf5;
    --text-secondary: #a9b1d6;
    --text-muted: #565f89;
    --accent-blue: #7aa2f7;
    --accent-green: #9ece6a;
    --accent-orange: #e0af68;
    --accent-red: #f7768e;
    --accent-purple: #bb9af7;
    --accent-cyan: #7dcfff;
    --border-color: #3b4261;
    --highlight-bg: rgba(122, 162, 247, 0.15);
    --highlight-border: #7aa2f7;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-blue);
  }

  .logo svg { width: 24px; height: 24px; }

  .file-name {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 12px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--border-color);
    border-color: var(--accent-blue);
  }

  .btn-primary {
    background: var(--accent-blue);
    color: #1a1b26;
    border-color: var(--accent-blue);
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #89b4fa;
  }

  .btn svg { width: 16px; height: 16px; }

  /* ===== Main Layout ===== */
  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 200px;
  }

  .panel-left {
    flex: 1;
    border-right: 1px solid var(--border-color);
  }

  .panel-right {
    flex: 1;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    min-height: 38px;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .panel-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot-blue { background: var(--accent-blue); }
  .dot-green { background: var(--accent-green); }

  /* ===== Resize Handle ===== */
  .resize-handle {
    width: 4px;
    background: var(--border-color);
    cursor: col-resize;
    transition: background 0.2s;
    z-index: 10;
    flex-shrink: 0;
  }

  .resize-handle:hover,
  .resize-handle.active {
    background: var(--accent-blue);
  }

  /* ===== Document Preview ===== */
  .preview-container {
    flex: 1;
    overflow: auto;
    padding: 24px;
    background: var(--bg-primary);
  }

  .doc-preview {
    max-width: 800px;
    margin: 0 auto;
    background: #ffffff;
    color: #1a1a1a;
    padding: 60px 72px;
    min-height: 600px;
    box-shadow: var(--shadow);
    border-radius: 4px;
    font-family: 'Calibri', 'SimSun', serif;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .doc-preview h1 { font-size: 26px; font-weight: 700; margin: 12px 0; color: #1a1a1a; }
  .doc-preview h2 { font-size: 22px; font-weight: 600; margin: 10px 0; color: #2a2a2a; }
  .doc-preview h3 { font-size: 18px; font-weight: 600; margin: 8px 0; color: #3a3a3a; }
  .doc-preview p { margin: 6px 0; }
  .doc-preview table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .doc-preview td, .doc-preview th {
    border: 1px solid #d0d0d0;
    padding: 6px 10px;
    text-align: left;
  }
  .doc-preview th { background: #f0f0f0; font-weight: 600; }
  .doc-preview ul, .doc-preview ol { margin: 6px 0 6px 24px; }
  .doc-preview li { margin: 2px 0; }
  .doc-preview strong, .doc-preview b { font-weight: 700; }
  .doc-preview em, .doc-preview i { font-style: italic; }
  .doc-preview u { text-decoration: underline; }

  /* Highlight for mapping */
  .doc-preview .xml-highlight {
    background: rgba(122, 162, 247, 0.25);
    outline: 2px solid var(--accent-blue);
    outline-offset: 1px;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .doc-preview .xml-highlight-hover {
    background: rgba(122, 162, 247, 0.12);
    outline: 1px dashed var(--accent-blue);
    outline-offset: 1px;
    border-radius: 2px;
  }

  /* ===== Drop Zone ===== */
  .drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
  }

  .drop-zone-icon {
    width: 80px;
    height: 80px;
    border: 2px dashed var(--border-color);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  .drop-zone.drag-over .drop-zone-icon {
    border-color: var(--accent-blue);
    background: var(--highlight-bg);
    transform: scale(1.05);
  }

  .drop-zone svg { width: 36px; height: 36px; color: var(--text-muted); }
  .drop-zone.drag-over svg { color: var(--accent-blue); }

  .drop-zone-text {
    font-size: 15px;
    color: var(--text-secondary);
    text-align: center;
  }

  .drop-zone-hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===== XML Editor ===== */
  .editor-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .CodeMirror {
    height: 100% !important;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: var(--bg-primary) !important;
  }

  .CodeMirror-gutters {
    background: var(--bg-secondary) !important;
    border-right: 1px solid var(--border-color) !important;
  }

  .CodeMirror-linenumber {
    color: var(--text-muted) !important;
  }

  .CodeMirror-activeline-background {
    background: rgba(255,255,255,0.03) !important;
  }

  .cm-xml-tag { color: var(--accent-red) !important; }
  .cm-xml-attribute { color: var(--accent-orange) !important; }
  .cm-xml-attribute-name { color: var(--accent-purple) !important; }
  .cm-xml-string { color: var(--accent-green) !important; }
  .cm-xml-comment { color: var(--text-muted) !important; font-style: italic; }
  .cm-xml-processing { color: var(--accent-cyan) !important; }

  /* XML element highlight on hover */
  .CodeMirror .cm-xml-highlight-line {
    background: rgba(122, 162, 247, 0.1) !important;
  }

  /* ===== Tooltip ===== */
  .ooxml-tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    font-size: 13px;
    line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .ooxml-tooltip.visible { opacity: 1; }

  .ooxml-tooltip .tag-name {
    color: var(--accent-blue);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .ooxml-tooltip .tag-desc {
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .ooxml-tooltip .tag-attrs {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ooxml-tooltip .attr-row {
    display: flex;
    gap: 8px;
    font-size: 12px;
  }

  .ooxml-tooltip .attr-name {
    color: var(--accent-purple);
    font-family: 'JetBrains Mono', monospace;
    min-width: 100px;
  }

  .ooxml-tooltip .attr-desc {
    color: var(--text-muted);
  }

  .ooxml-tooltip .spec-link {
    display: inline-block;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-color);
    color: var(--accent-cyan);
    font-size: 11px;
  }

  /* ===== Status Bar ===== */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 28px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-green);
  }

  .status-dot.error { background: var(--accent-red); }
  .status-dot.warning { background: var(--accent-orange); }

  /* ===== Apply Button ===== */
  .apply-bar {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
    background: rgba(122, 162, 247, 0.1);
    border-bottom: 1px solid var(--accent-blue);
    flex-shrink: 0;
  }

  .apply-bar.visible { display: flex; }

  .apply-bar .message {
    font-size: 13px;
    color: var(--accent-blue);
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    top: 60px;
    right: 20px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast-success { background: #1a3a2a; color: var(--accent-green); border: 1px solid rgba(158,206,106,0.3); }
  .toast-error { background: #3a1a1a; color: var(--accent-red); border: 1px solid rgba(247,118,142,0.3); }
  .toast-info { background: #1a2a3a; color: var(--accent-cyan); border: 1px solid rgba(125,207,255,0.3); }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ===== Loading ===== */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,27,38,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .loading-overlay.visible { display: flex; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ===== Empty Editor State ===== */
  .editor-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .main-container { flex-direction: column; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border-color); }
    .resize-handle { width: 100%; height: 4px; cursor: row-resize; }
    .doc-preview { padding: 30px 24px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      OOXML Editor
    </div>
    <span class="file-name" id="fileName">未加载文件</span>
  </div>
  <div class="header-actions">
    <label class="btn" for="fileInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      打开 DOCX
    </label>
    <input type="file" id="fileInput" accept=".docx" style="display:none">
    <button class="btn" id="btnApply" disabled title="应用 XML 修改到预览 (Ctrl+Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      应用修改
    </button>
    <button class="btn btn-primary" id="btnExport" disabled title="导出修改后的 DOCX">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      导出 DOCX
    </button>
  </div>
</header>

<!-- Main -->
<div class="main-container">
  <!-- Left Panel: Document Preview -->
  <div class="panel panel-left" id="panelLeft">
    <div class="panel-header">
      <span class="panel-title"><span class="dot dot-green"></span> 文档预览</span>
      <span style="font-size:11px;color:var(--text-muted)" id="previewInfo"></span>
    </div>
    <div class="preview-container" id="previewContainer">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="drop-zone-text">拖拽 .docx 文件到此处</div>
        <div class="drop-zone-hint">或点击上方「打开 DOCX」按钮选择文件</div>
      </div>
      <div class="doc-preview" id="docPreview" style="display:none"></div>
    </div>
    <div class="loading-overlay" id="previewLoading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Right Panel: XML Editor -->
  <div class="panel panel-right" id="panelRight">
    <div class="panel-header">
      <span class="panel-title"><span class="dot dot-blue"></span> document.xml</span>
      <span style="font-size:11px;color:var(--text-muted)" id="editorInfo">OOXML 格式</span>
    </div>
    <div class="apply-bar" id="applyBar">
      <span class="message">XML 已修改，点击「应用修改」或按 Ctrl+Enter 更新预览</span>
    </div>
    <div class="editor-container" id="editorContainer">
      <div class="editor-empty" id="editorEmpty">
        加载 DOCX 文件后，此处将显示 document.xml 的内容<br>
        <span style="color:var(--text-muted);font-size:12px;margin-top:8px">
          支持悬停 XML 元素查看 OOXML 规范说明
        </span>
      </div>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-left">
    <span class="status-item"><span class="status-dot" id="statusDot"></span> <span id="statusText">就绪</span></span>
    <span class="status-item" id="xmlStatus"></span>
  </div>
  <div class="status-right">
    <span class="status-item" id="cursorPos"></span>
    <span class="status-item" id="xmlSize"></span>
  </div>
</div>

<!-- Tooltip -->
<div class="ooxml-tooltip" id="ooxmlTooltip"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ====================================================================
// OOXML 规范参考数据
// ====================================================================
const OOXML_SPEC = {
  // 文档根元素
  'w:document': {
    desc: '文档根元素 (Document Root) — 包含整个 Word 文档的主要内容',
    spec: 'ECMA-376 Part 1, §17.6'
  },
  'w:body': {
    desc: '文档主体 (Document Body) — 包含文档的主要内容和节属性',
    spec: 'ECMA-376 Part 1, §17.2.2'
  },
  // 段落相关
  'w:p': {
    desc: '段落 (Paragraph) — 文档中最基本的块级元素，包含文本和格式',
    spec: 'ECMA-376 Part 1, §17.3.1.22',
    attrs: {
      'w:rsidR': '段落标识符，用于合并文档时追踪修订',
      'w:rsidRDefault': '默认段落属性标识符',
      'w:styleId': '引用的段落样式 ID'
    }
  },
  'w:pPr': {
    desc: '段落属性 (Paragraph Properties) — 定义段落的格式设置',
    spec: 'ECMA-376 Part 1, §17.3.1.26',
    attrs: {
      'w:styleId': '段落样式引用',
      'w:keepNext': '与下一段保持在一起',
      'w:keepLines': '段落内不分页',
      'w:pageBreakBefore': '段前分页'
    }
  },
  'w:pStyle': {
    desc: '段落样式引用 (Paragraph Style Reference) — 指定段落使用的命名样式',
    spec: 'ECMA-376 Part 1, §17.3.1.27',
    attrs: {
      'w:val': '样式 ID，如 "Heading1", "Normal", "ListParagraph"'
    }
  },
  'w:jc': {
    desc: '段落对齐方式 (Justification) — 控制段落的文本对齐',
    spec: 'ECMA-376 Part 1, §17.3.1.13',
    attrs: {
      'w:val': 'left=左对齐, center=居中, right=右对齐, both=两端对齐, distribute=分散对齐'
    }
  },
  'w:ind': {

let docxZip = null;          // JSZip 实例

// 显示 Toast 通知
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  const icons = {
    success: '✓',
    error: '✗',
    info: 'ℹ'
  };
  toast.innerHTML = `<span>${icons[type] || 'ℹ'}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// 格式化 XML（美化缩进）
function formatXml(xml) {
  const PADDING = '  ';
  let formatted = '';
  let indent = 0;
  const tags = xml.replace(/(>)\s*(<)/g, '$1\n$2').split('\n');

  tags.forEach(tag => {
    if (!tag.match(/^<\w[^>]*[^/]>.*$/)) {
      // 自闭合标签或结束标签
      if (tag.match(/^<\/\w/)) {
        indent--;
      }
      formatted += PADDING.repeat(Math.max(0, indent)) + tag + '\n';
      if (tag.match(/^<\w[^>]*[^/]>.*$/)) {
        indent++;
      }
    } else {
      // 开始标签
      formatted += PADDING.repeat(Math.max(0, indent)) + tag + '\n';
      indent++;
    }
  });

  return formatted.trim();
}

// 简单压缩 XML（移除多余空白）
function minifyXml(xml) {
  return xml.replace(/>\s+</g, '><').replace(/\s+/g, ' ').trim();
}

// ====================================================================
// DOCX 解析
// ====================================================================

async function loadDocx(file) {
  try {
    document.getElementById('previewLoading').classList.add('visible');
    document.getElementById('statusText').textContent = '正在解析...';

    const arrayBuffer = await file.arrayBuffer();
    docxZip = await JSZip.loadAsync(arrayBuffer);

    // 提取 document.xml
    const docXmlFile = docxZip.file('word/document.xml');
    if (!docXmlFile) {
      throw new Error('无效的 DOCX 文件：找不到 word/document.xml');
    }

    originalXml = await docXmlFile.async('string');

    // 格式化 XML 用于显示
    let displayXml = originalXml;
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(originalXml, 'application/xml');
      const serializer = new XMLSerializer();
      displayXml = formatXml(serializer.serializeToString(doc));
    } catch (e) {
      // 如果格式化失败，使用原始内容
    }

    // 初始化编辑器
    initEditor(displayXml);

    // 渲染预览
    await renderPreview();

    // 更新 UI
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('docPreview').style.display = 'block';
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('btnApply').disabled = false;
    document.getElementById('btnExport').disabled = false;
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '文件已加载';
    document.getElementById('xmlStatus').textContent = `document.xml (${(originalXml.length / 1024).toFixed(1)} KB)`;

    showToast(`已加载 ${file.name}`, 'success');
  } catch (error) {
    console.error('加载 DOCX 失败:', error);
    showToast(`加载失败: ${error.message}`, 'error');
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = '加载失败';
  } finally {
    document.getElementById('previewLoading').classList.remove('visible');
  }
}

// ====================================================================
// 文档预览渲染
// ====================================================================

async function renderPreview() {
  const preview = document.getElementById('docPreview');
  preview.innerHTML = '<div style="color:#999;text-align:center;padding:40px">正在渲染预览...</div>';

  try {
    // 使用 mammoth.js 将 DOCX 转为 HTML
    if (typeof mammoth !== 'undefined') {
      const arrayBuffer = await docxZip.generateAsync({ type: 'arraybuffer' });
      const result = await mammoth.convertToHtml({ arrayBuffer });
      let html = result.value;

      // 为每个段落添加 data 属性用于映射
      html = html.replace(/<p[^>]*>/g, (match, offset) => {
        return match.replace('>', ' data-ooxml-type="p">');
      });
      html = html.replace(/<h([1-6])[^>]*>/g, (match, level) => {
        return match.replace('>', ` data-ooxml-type="h${level}">`);
      });
      html = html.replace(/<li[^>]*>/g, (match) => {
        return match.replace('>', ' data-ooxml-type="li">');
      });
      html = html.replace(/<td[^>]*>/g, (match) => {
        return match.replace('>', ' data-ooxml-type="td">');
      });

      preview.innerHTML = html;

      if (result.messages.length > 0) {
        console.warn('Mammoth 警告:', result.messages);
      }
    } else {
      // 回退方案：直接解析 XML 生成简单 HTML
      preview.innerHTML = renderXmlToHtml(originalXml);
    }

    // 构建段落映射
    buildParagraphMap();

    // 更新预览信息
    const paragraphs = preview.querySelectorAll('p, h1, h2, h3, h4, h5, h6, li');
    document.getElementById('previewInfo').textContent = `${paragraphs.length} 个段落/元素`;

  } catch (error) {
    console.error('渲染预览失败:', error);
    preview.innerHTML = `<div style="color:#f7768e;padding:20px">
      <strong>预览渲染失败</strong><br>
      <span style="font-size:12px;color:#999">${error.message}</span><br><br>
      <span style="font-size:12px;color:#999">请尝试修改 XML 后点击「应用修改」重新渲染</span>
    </div>`;
  }
}

// 简单的 XML → HTML 转换（回退方案）
function renderXmlToHtml(xml) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'application/xml');

    if (doc.querySelector('parsererror')) {
      return '<p style="color:red">XML 解析错误</p>';
    }

    let html = '';
    const body = doc.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 'body')[0];

    if (!body) return '<p style="color:#999">无法找到文档主体</p>';

    function processNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent;
      }

      const localName = node.localName;
      const ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';

      if (node.namespaceURI !== ns) return '';

      switch (localName) {
        case 'p': {
          const style = [];
          const pPr = getChild(node, 'pPr');
          if (pPr) {
            const jc = getChild(pPr, 'jc');
            if (jc) style.push(`text-align:${jc.getAttribute('w:val')}`);
          }
          const styleAttr = style.length ? ` style="${style.join(';')}"` : '';
          let content = '';
          node.childNodes.forEach(child => { content += processNode(child); });
          return `<p${styleAttr} data-ooxml-type="p">${content}</p>`;
        }
        case 'r': {
          let content = '';
          let styles = [];
          const rPr = getChild(node, 'rPr');
          if (rPr) {
            if (getChild(rPr, 'b')) styles.push('font-weight:bold');
            if (getChild(rPr, 'i')) styles.push('font-style:italic');
            if (getChild(rPr, 'u')) styles.push('text-decoration:underline');
            const sz = getChild(rPr, 'sz');
            if (sz) styles.push(`font-size:${parseInt(sz.getAttribute('w:val') || '24') / 2}pt`);
            const color = getChild(rPr, 'color');
            if (color) styles.push(`color:#${color.getAttribute('w:val')}`);
          }
          node.childNodes.forEach(child => { content += processNode(child); });
          if (styles.length) {
            return `<span style="${styles.join(';')}">${content}</span>`;
          }
          return content;
        }
        case 't':
          return escapeHtml(node.textContent);
        case 'br':
          return '<br>';
        case 'tab':
          return '&nbsp;&nbsp;&nbsp;&nbsp;';
        case 'tbl': {
          let content = '';
          node.childNodes.forEach(child => { content += processNode(child); });
          return `<table>${content}</table>`;
        }
        case 'tr': {
          let content = '';
          node.childNodes.forEach(child => { content += processNode(child); });
          return `<tr>${content}</tr>`;
        }
        case 'tc': {
          let content = '';
          node.childNodes.forEach(child => { content += processNode(child); });
          return `<td data-ooxml-type="td">${content}</td>`;
        }
        case 'hyperlink': {
          let content = '';
          node.childNodes.forEach(child => { content += processNode(child); });
          return content;
        }
        default:
          return '';
      }
    }

    body.childNodes.forEach(child => { html += processNode(child); });
    return html || '<p style="color:#999">文档内容为空</p>';
  } catch (e) {
    return `<p style="color:red">渲染错误: ${escapeHtml(e.message)}</p>`;
  }
}

function getChild(parent, localName) {
  const ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
  for (let i = 0; i < parent.childNodes.length; i++) {
    const child = parent.childNodes[i];
    if (child.localName === localName && child.namespaceURI === ns) {
      return child;
    }
  }
  return null;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function buildParagraphMap() {
  currentParagraphs = [];
  const preview = document.getElementById('docPreview');
  const elements = preview.querySelectorAll('[data-ooxml-type]');
  elements.forEach((el, index) => {
    currentParagraphs.push({

    });
  });
}

// ====================================================================
// XML 编辑器初始化
// ====================================================================

function initEditor(xmlContent) {
  const container = document.getElementById('editorContainer');
  const empty = document.getElementById('editorEmpty');
  if (empty) empty.style.display = 'none';

  // 清除已有编辑器
  if (editor) {
    editor.toTextArea();
  }

  // 创建 textarea
  let textarea = container.querySelector('textarea');
  if (!textarea) {
    textarea = document.createElement('textarea');
    container.appendChild(textarea);
  }
  textarea.value = xmlContent;

  // 初始化 CodeMirror
  editor = CodeMirror.fromTextArea(textarea, {
    mode: 'xml',
    theme: 'monokai',
    lineNumbers: true,
    lineWrapping: true,
    autoCloseTags: true,
    autoCloseBrackets: true,
    indentUnit: 2,
    tabSize: 2,
    indentWithTabs: false,
    matchTags: { bothTags: true },
    styleActiveLine: true,
    foldGutter: false,
    extraKeys: {
      'Ctrl-Enter': () => applyChanges(),
      'Cmd-Enter': () => applyChanges(),
      'Ctrl-S': (cm) => { exportDocx(); return false; },
      'Cmd-S': (cm) => { exportDocx(); return false; }
    }
  });

  // 监听变化
  editor.on('change', () => {
    if (!xmlModified) {
      xmlModified = true;
      document.getElementById('applyBar').classList.add('visible');
      document.getElementById('statusDot').className = 'status-dot warning';
      document.getElementById('statusText').textContent = 'XML 已修改（未应用）';
    }
  });

  // 监听光标位置
  editor.on('cursorActivity', () => {
    const pos = editor.getCursor();
    document.getElementById('cursorPos').textContent = `行 ${pos.line + 1}, 列 ${pos.ch + 1}`;
  });

  // 悬停显示 OOXML 提示
  editor.on('cursorActivity', () => {
    highlightPreviewFromEditor();
  });

  // 鼠标悬停事件
  const cmEl = editor.getWrapperElement();
  cmEl.addEventListener('mouseover', handleEditorHover);
  cmEl.addEventListener('mouseout', handleEditorHoverOut);

  // 更新大小信息
  updateXmlSize();
  editor.on('change', updateXmlSize);

  // 刷新编辑器
  setTimeout(() => editor.refresh(), 100);
}

function updateXmlSize() {
  if (!editor) return;
  const content = editor.getValue();
  const lines = editor.lineCount();
  document.getElementById('xmlSize').textContent = `${lines} 行 | ${(content.length / 1024).toFixed(1)} KB`;
}

// ====================================================================
// OOXML 提示 Tooltip
// ====================================================================

function handleEditorHover(e) {
  const coords = editor.coordsChar({ left: e.clientX, top: e.clientY });
  if (!coords) return;

  const token = editor.getTokenAt(coords);
  const line = editor.getLine(coords.line);

  // 查找当前标签名
  let tagName = null;
  let attrName = null;

  if (token.type === 'tag' || token.type === 'xml-tag') {
    // 提取标签名
    const match = token.string.match(/<\/?(?:\w+:)?([\w]+)/);
    if (match) {
      tagName = match[1].includes(':') ? match[0].replace(/[<\/>]/g, '') : `w:${match[1]}`;
    }
  } else if (token.type === 'attribute' || token.type === 'xml-attribute-name') {
    attrName = token.string;
    // 查找所属标签
    const lineBefore = line.substring(0, token.start);
    const tagMatch = lineBefore.match(/<\/?(?:\w+:)?([\w]+)/g);
    if (tagMatch) {
      tagName = tagMatch[tagMatch.length - 1].replace(/[<\/>]/g, '');
    }
  } else if (token.type === 'string' || token.type === 'xml-string') {
    // 查找属性名
    const lineBefore = line.substring(0, token.start);
    const attrMatch = lineBefore.match(/([\w:]+)\s*=\s*$/);
    if (attrMatch) {
      attrName = attrMatch[1];
    }
    const tagMatch = lineBefore.match(/<\/?(?:\w+:)?([\w]+)/g);
    if (tagMatch) {
      tagName = tagMatch[tagMatch.length - 1].replace(/[<\/>]/g, '');
    }
  }

  if (tagName && OOXML_SPEC[tagName]) {
    showTooltip(e.clientX, e.clientY, tagName, attrName);
    highlightPreviewFromTag(tagName, coords.line);
  } else if (tagName) {
    // 未知标签，显示基本信息
    showTooltip(e.clientX, e.clientY, tagName, attrName, true);
  }
}

function handleEditorHoverOut(e) {
  hideTooltip();
  clearPreviewHighlight();
}

function showTooltip(x, y, tagName, attrName, isUnknown = false) {
  const tooltip = document.getElementById('ooxmlTooltip');
  const spec = OOXML_SPEC[tagName];

  let html = `<div class="tag-name">&lt;${tagName}&gt;</div>`;

  if (isUnknown) {
    html += `<div class="tag-desc" style="color:var(--text-muted)">
      此元素未在 OOXML 规范库中找到<br>
      <span style="font-size:11px">参考: ECMA-376 Part 1 (ISO/IEC 29500)</span>
    </div>`;
  } else {
    html += `<div class="tag-desc">${spec.desc}</div>`;

    if (attrName && spec.attrs && spec.attrs[attrName]) {
      html += `<div class="tag-attrs">
        <div class="attr-row">
          <span class="attr-name">${attrName}</span>
          <span class="attr-desc">${spec.attrs[attrName]}</span>
        </div>
      </div>`;
    } else if (spec.attrs) {
      html += `<div class="tag-attrs">`;
      const entries = Object.entries(spec.attrs).slice(0, 5);
      entries.forEach(([name, desc]) => {
        html += `<div class="attr-row">
          <span class="attr-name">${name}</span>
          <span class="attr-desc">${desc}</span>
        </div>`;
      });
      if (Object.keys(spec.attrs).length > 5) {
        html += `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">...还有 ${Object.keys(spec.attrs).length - 5} 个属性</div>`;
      }
      html += `</div>`;
    }

    html += `<div class="spec-link">📄 ${spec.spec}</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');

  // 定位
  const rect = tooltip.getBoundingClientRect();
  let left = x + 12;
  let top = y + 12;

  if (left + rect.width > window.innerWidth) {
    left = x - rect.width - 12;
  }
  if (top + rect.height > window.innerHeight) {
    top = y - rect.height - 12;
  }

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('ooxmlTooltip').classList.remove('visible');
}

// ====================================================================
// 预览高亮（从编辑器到预览）
// ====================================================================

function highlightPreviewFromTag(tagName, line) {
  clearPreviewHighlight();
  const preview = document.getElementById('docPreview');
  if (!preview || preview.style.display === 'none') return;

  // 根据标签类型选择高亮策略
  const typeMap = {
    'w:p': '[data-ooxml-type="p"]',
    'w:rPr': '[data-ooxml-type="p"]',
    'w:pPr': '[data-ooxml-type="p"]',
    'w:r': '[data-ooxml-type="p"] span',
    'w:t': '[data-ooxml-type="p"] span',
    'w:tbl': 'table',
    'w:tr': 'tr',
    'w:tc': '[data-ooxml-type="td"]',
  };

  // 计算段落索引
  const content = editor.getValue();
  const lines = content.split('\n');
  let pCount = 0;
  for (let i = 0; i <= Math.min(line, lines.length - 1); i++) {
    if (lines[i].includes('<w:p ') || lines[i].includes('<w:p>')) {
      pCount++;
    }
  }

  // 找到对应的预览元素
  const elements = preview.querySelectorAll('[data-ooxml-type]');
  if (pCount > 0 && pCount <= elements.length) {
    elements[pCount - 1].classList.add('xml-highlight-hover');
  }
}

function highlightPreviewFromEditor() {

}

function clearPreviewHighlight() {
  const preview = document.getElementById('docPreview');
  if (!preview) return;
  preview.querySelectorAll('.xml-highlight, .xml-highlight-hover').forEach(el => {
    el.classList.remove('xml-highlight', 'xml-highlight-hover');

// ====================================================================
// 应用修改
// ====================================================================

async function applyChanges() {
  if (!editor || !docxZip) return;

  try {
    document.getElementById('statusText').textContent = '正在应用修改...';

    // 获取编辑器中的 XML
    let newXml = editor.getValue();

    // 压缩 XML（移除格式化空白，保留原始格式）
    // 但先尝试直接使用，因为 OOXML 解析器通常能处理格式化的 XML
    try {
      // 验证 XML 有效性
      const parser = new DOMParser();
      const doc = parser.parseFromString(newXml, 'application/xml');
      const error = doc.querySelector('parsererror');
      if (error) {
        throw new Error('XML 格式错误: ' + error.textContent.substring(0, 100));
      }

      // 序列化回紧凑格式
      const serializer = new XMLSerializer();
      newXml = serializer.serializeToString(doc);
    } catch (e) {
      showToast(e.message, 'error');
      return;
    }

    // 更新 ZIP 中的 document.xml
    docxZip.file('word/document.xml', newXml);
    originalXml = newXml;

    // 重新渲染预览
    await renderPreview();

    // 更新状态
    xmlModified = false;
    document.getElementById('applyBar').classList.remove('visible');
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '修改已应用';

    showToast('修改已成功应用到预览', 'success');
  } catch (error) {
    console.error('应用修改失败:', error);
    showToast(`应用失败: ${error.message}`, 'error');
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = '应用失败';
  }
}

// ====================================================================
// 导出 DOCX
// ====================================================================

async function exportDocx() {
  if (!docxZip) return;

  try {
    // 如果有未应用的修改，先应用
    if (xmlModified) {
      await applyChanges();
    }

    const blob = await docxZip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    });

    const fileName = document.getElementById('fileName').textContent || 'document';
    const baseName = fileName.replace(/\.docx$/i, '');
    saveAs(blob, `${baseName}_edited.docx`);

    showToast('DOCX 文件已导出', 'success');
  } catch (error) {
    console.error('导出失败:', error);
    showToast(`导出失败: ${error.message}`, 'error');
  }
}

// ====================================================================
// 面板大小调整
// ====================================================================

function initResize() {
  const handle = document.getElementById('resizeHandle');
  const panelLeft = document.getElementById('panelLeft');
  const panelRight = document.getElementById('panelRight');
  const container = document.querySelector('.main-container');

  let startX, startLeftWidth;

  handle.addEventListener('mousedown', (e) => {
    startX = e.clientX;
    startLeftWidth = panelLeft.offsetWidth;
    handle.classList.add('active');
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  function onMouseMove(e) {
    const diff = e.clientX - startX;
    const containerWidth = container.offsetWidth;
    const newLeftWidth = ((startLeftWidth + diff) / containerWidth) * 100;
    const clamped = Math.max(20, Math.min(80, newLeftWidth));
    panelLeft.style.flex = `0 0 ${clamped}%`;
    panelRight.style.flex = `0 0 ${100 - clamped}%`;
    if (editor) editor.refresh();
  }

  function onMouseUp() {
    handle.classList.remove('active');
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    if (editor) editor.refresh();
  }
}

// ====================================================================
// 文件拖拽
// ====================================================================

function initDragDrop() {
  const dropZone = document.getElementById('dropZone');
  const previewContainer = document.getElementById('previewContainer');

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
    document.body.addEventListener(event, (e) => {
      e.preventDefault();
      e.stopPropagation();
    });
  });

  document.body.addEventListener('dragenter', () => {
    dropZone.classList.add('drag-over');
  });

  document.body.addEventListener('dragleave', (e) => {
    if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
      dropZone.classList.remove('drag-over');
    }
  });

  document.body.addEventListener('drop', (e) => {
    dropZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].name.endsWith('.docx')) {
      loadDocx(files[0]);
    } else {
      showToast('请拖拽 .docx 文件', 'error');
    }
  });
}

// ====================================================================
// 预览元素悬停 → 编辑器高亮
// ====================================================================

function initPreviewHover() {
  const preview = document.getElementById('docPreview');

  preview.addEventListener('mouseover', (e) => {
    const target = e.target.closest('[data-ooxml-type]');
    if (!target) return;

    const index = Array.from(preview.querySelectorAll('[data-ooxml-type]')).indexOf(target);
    if (index < 0) return;

    // 在编辑器中找到对应的 <w:p> 标签
    if (!editor) return;
    const content = editor.getValue();
    const lines = content.split('\n');

    let pCount = 0;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes('<w:p ') || lines[i].includes('<w:p>')) {
        pCount++;
        if (pCount === index + 1) {
          // 高亮对应行
          editor.addLineClass(i, 'background', 'cm-xml-highlight-line');
          // 找到结束标签
          for (let j = i + 1; j < lines.length; j++) {
            editor.addLineClass(j, 'background', 'cm-xml-highlight-line');
            if (lines[j].includes('</w:p>')) break;
          }
          break;
        }
      }
    }

    // 高亮预览元素
    target.classList.add('xml-highlight');
  });

  preview.addEventListener('mouseout', (e) => {
    const target = e.target.closest('[data-ooxml-type]');
    if (!target) return;

    target.classList.remove('xml-highlight');

    // 清除编辑器高亮
    if (editor) {
      const allLines = editor.lineCount();
      for (let i = 0; i < allLines; i++) {
        editor.removeLineClass(i, 'background', 'cm-xml-highlight-line');
      }
    }
  });
}

// ====================================================================
// 键盘快捷键
// ====================================================================

function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    // Ctrl+Enter 应用修改
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      applyChanges();
    }
    // Ctrl+S 导出
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      exportDocx();
    }
  });
}
